<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="500" height="500">
  <defs>
    <!-- ═══ GRADIENTS ═══ -->
    <radialGradient id="bgGrad" cx="50%" cy="58%" r="55%">
      <stop offset="0%" stop-color="#0E1525"/>
      <stop offset="70%" stop-color="#080F1C"/>
      <stop offset="100%" stop-color="#050810"/>
    </radialGradient>
    <!-- Nébuleuse violette -->
    <radialGradient id="nebulaPurple" cx="25%" cy="32%" r="42%">
      <stop offset="0%" stop-color="#2D0F5E" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <!-- Nébuleuse teal -->
    <radialGradient id="nebulaTeal" cx="78%" cy="28%" r="38%">
      <stop offset="0%" stop-color="#043D3D" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <!-- Lueur horizon planétaire -->
    <radialGradient id="horizonGlow" cx="50%" cy="100%" r="60%">
      <stop offset="0%" stop-color="#C84010" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#801800" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#050810" stop-opacity="0"/>
    </radialGradient>
    <!-- Or Colonial -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0C840"/>
      <stop offset="50%" stop-color="#C8940A"/>
      <stop offset="100%" stop-color="#8B6200"/>
    </linearGradient>
    <!-- Play button -->
    <linearGradient id="playGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F4D060"/>
      <stop offset="100%" stop-color="#A07000"/>
    </linearGradient>
    <!-- Atmosphère planète -->
    <linearGradient id="atmosGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EA580C" stop-opacity="0"/>
      <stop offset="55%" stop-color="#EA580C" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.6"/>
    </linearGradient>

    <!-- ═══ FILTRES ═══ -->
    <filter id="goldGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="purpleGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="textGlow" x="-15%" y="-40%" width="130%" height="180%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="engineGlow" x="-250%" y="-250%" width="600%" height="600%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="atmosphereBlur">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <!-- ═══ PATTERN SCANLINES ═══ -->
    <pattern id="scanlines" width="500" height="4" patternUnits="userSpaceOnUse">
      <rect width="500" height="1" y="0" fill="#000000" opacity="0.18"/>
    </pattern>
  </defs>

  <!-- ══════════════════════════════════════
       FOND — ESPACE & NÉBULEUSES
  ══════════════════════════════════════ -->
  <rect width="500" height="500" fill="url(#bgGrad)"/>
  <rect width="500" height="500" fill="url(#nebulaPurple)"/>
  <rect width="500" height="500" fill="url(#nebulaTeal)"/>
  <rect width="500" height="500" fill="url(#horizonGlow)"/>
  <rect width="500" height="500" fill="url(#scanlines)" opacity="0.65"/>

  <!-- ══════════════════════════════════════
       CHAMP D'ÉTOILES
  ══════════════════════════════════════ -->
  <g fill="white">
    <circle cx="83"  cy="86"  r="1.2" opacity="0.90"/>
    <circle cx="109" cy="140" r="0.8" opacity="0.70"/>
    <circle cx="130" cy="93"  r="1.0" opacity="0.80"/>
    <circle cx="73"  cy="164" r="0.7" opacity="0.60"/>
    <circle cx="158" cy="116" r="0.9" opacity="0.80"/>
    <circle cx="93"  cy="198" r="0.6" opacity="0.55"/>
    <circle cx="105" cy="105" r="2.0" opacity="0.95"/>
    <circle cx="378" cy="90"  r="1.1" opacity="0.90"/>
    <circle cx="408" cy="138" r="0.8" opacity="0.70"/>
    <circle cx="430" cy="108" r="1.0" opacity="0.82"/>
    <circle cx="393" cy="173" r="0.7" opacity="0.62"/>
    <circle cx="363" cy="103" r="0.9" opacity="0.85"/>
    <circle cx="443" cy="193" r="0.6" opacity="0.52"/>
    <circle cx="420" cy="122" r="1.8" opacity="0.92"/>
    <circle cx="68"  cy="268" r="0.8" opacity="0.55"/>
    <circle cx="53"  cy="308" r="0.7" opacity="0.48"/>
    <circle cx="458" cy="268" r="0.8" opacity="0.55"/>
    <circle cx="468" cy="318" r="0.7" opacity="0.48"/>
    <circle cx="76"  cy="178" r="1.5" opacity="0.70"/>
    <circle cx="195" cy="78"  r="0.8" opacity="0.65"/>
    <circle cx="310" cy="82"  r="0.7" opacity="0.60"/>
    <circle cx="250" cy="72"  r="1.0" opacity="0.75"/>
  </g>

  <!-- ══════════════════════════════════════
       VAISSEAUX SPATIAUX — Colonial Vipers
  ══════════════════════════════════════ -->

  <!-- Viper principal (haut-droite, cap SW) -->
  <g transform="translate(372, 145) rotate(-16)" opacity="0.85">
    <!-- Fuselage -->
    <polygon points="-33,0 -20,-5 8,-3 33,0 8,3 -20,5"
      fill="#0A1020" stroke="#C8940A" stroke-width="1.1"/>
    <!-- Aile haute -->
    <polygon points="-6,-5 14,-3 -9,-27 -25,-14"
      fill="#080E1C" stroke="#C8940A" stroke-width="0.9"/>
    <!-- Aile basse -->
    <polygon points="-6,5 14,3 -9,27 -25,14"
      fill="#080E1C" stroke="#C8940A" stroke-width="0.9"/>
    <!-- Canopée cyan -->
    <ellipse cx="16" cy="-1" rx="8" ry="3.5"
      fill="#001A22" stroke="#00C8FF" stroke-width="0.8" opacity="0.85"/>
    <!-- Moteur — glow cyan -->
    <ellipse cx="-38" cy="0" rx="8" ry="3.2"
      fill="#00C8FF" opacity="0.75" filter="url(#engineGlow)"/>
    <ellipse cx="-38" cy="0" rx="3" ry="1.5"
      fill="white" opacity="0.92"/>
    <!-- Traînée de sillage -->
    <line x1="-33" y1="0" x2="-80" y2="6"
      stroke="#00C8FF" stroke-width="1.8" opacity="0.25" stroke-linecap="round"/>
  </g>

  <!-- Viper secondaire (haut-gauche, plus éloigné) -->
  <g transform="translate(128, 158) rotate(-8) scale(0.52)" opacity="0.42">
    <polygon points="-33,0 -20,-5 8,-3 33,0 8,3 -20,5"
      fill="#0A1020" stroke="#C8940A" stroke-width="1.8"/>
    <polygon points="-6,-5 14,-3 -9,-27 -25,-14"
      fill="#080E1C" stroke="#C8940A" stroke-width="1.4"/>
    <polygon points="-6,5 14,3 -9,27 -25,14"
      fill="#080E1C" stroke="#C8940A" stroke-width="1.4"/>
    <ellipse cx="-38" cy="0" rx="10" ry="3.8"
      fill="#00C8FF" opacity="0.65" filter="url(#engineGlow)"/>
  </g>

  <!-- ══════════════════════════════════════
       HEXAGONE EXTÉRIEUR (flat-top, r=210)
  ══════════════════════════════════════ -->
  <polygon
    points="460,250 355,431.7 145,431.7 40,250 145,68.3 355,68.3"
    fill="none" stroke="url(#goldGrad)" stroke-width="2.5"
    filter="url(#goldGlow)"/>

  <!-- Points dorés aux sommets -->
  <circle cx="460" cy="250"   r="4.5" fill="#C8940A" filter="url(#goldGlow)"/>
  <circle cx="355" cy="431.7" r="4.5" fill="#C8940A" filter="url(#goldGlow)"/>
  <circle cx="145" cy="431.7" r="4.5" fill="#C8940A" filter="url(#goldGlow)"/>
  <circle cx="40"  cy="250"   r="4.5" fill="#C8940A" filter="url(#goldGlow)"/>
  <circle cx="145" cy="68.3"  r="4.5" fill="#C8940A" filter="url(#goldGlow)"/>
  <circle cx="355" cy="68.3"  r="4.5" fill="#C8940A" filter="url(#goldGlow)"/>

  <!-- Hexagone intérieur (r=190) -->
  <polygon
    points="440,250 345,414.6 155,414.6 60,250 155,85.4 345,85.4"
    fill="none" stroke="#C8940A" stroke-width="1" opacity="0.28"/>

  <!-- ══════════════════════════════════════
       READOUTS TACTIQUES
  ══════════════════════════════════════ -->
  <text x="90" y="112"
    font-family="'Courier New',Courier,monospace" font-size="10"
    fill="#C8940A" opacity="0.45" letter-spacing="2">SYS.01</text>
  <text x="410" y="112"
    font-family="'Courier New',Courier,monospace" font-size="10"
    fill="#C8940A" opacity="0.45" letter-spacing="1" text-anchor="end">v1.0.10</text>

  <!-- Coupes angulaires (panneaux militaires) -->
  <line x1="145" y1="68.3"  x2="180" y2="84"  stroke="#C8940A" stroke-width="1" opacity="0.5"/>
  <line x1="355" y1="68.3"  x2="320" y2="84"  stroke="#C8940A" stroke-width="1" opacity="0.5"/>
  <line x1="145" y1="431.7" x2="180" y2="416" stroke="#C8940A" stroke-width="1" opacity="0.5"/>
  <line x1="355" y1="431.7" x2="320" y2="416" stroke="#C8940A" stroke-width="1" opacity="0.5"/>

  <!-- ══════════════════════════════════════
       ANNEAUX DE CIBLAGE TACTIQUES
  ══════════════════════════════════════ -->

  <!-- Anneau extérieur cyan (r=150, 4×70° / gaps 20°, circ≈942, arc=183, gap=52) -->
  <circle cx="250" cy="250" r="150"
    fill="none" stroke="#00C8FF" stroke-width="3.5"
    stroke-dasharray="183 52"
    transform="rotate(-35 250 250)"
    filter="url(#cyanGlow)" opacity="0.88"/>

  <!-- Anneau médian violet (r=130, 8×30° / gaps 15°, circ≈817, arc=68, gap=34) -->
  <circle cx="250" cy="250" r="130"
    fill="none" stroke="#A855F7" stroke-width="1.8"
    stroke-dasharray="68 34"
    transform="rotate(8 250 250)"
    filter="url(#purpleGlow)" opacity="0.65"/>

  <!-- Anneau intérieur or (r=115, 4×50° / gaps 40°, circ≈723, arc=100, gap=80) -->
  <circle cx="250" cy="250" r="115"
    fill="none" stroke="#C8940A" stroke-width="1.5"
    stroke-dasharray="100 80"
    transform="rotate(10 250 250)"
    opacity="0.55"/>

  <!-- ══════════════════════════════════════
       RÉTICULE DE VISÉE
  ══════════════════════════════════════ -->
  <g stroke="#C8940A" stroke-width="1" opacity="0.62">
    <line x1="60"  y1="250" x2="175" y2="250"/>
    <line x1="325" y1="250" x2="440" y2="250"/>
    <line x1="250" y1="60"  x2="250" y2="175"/>
    <line x1="250" y1="325" x2="250" y2="440"/>
    <!-- Ticks horizontal -->
    <line x1="118" y1="244" x2="118" y2="256"/>
    <line x1="142" y1="247" x2="142" y2="253"/>
    <line x1="382" y1="244" x2="382" y2="256"/>
    <line x1="358" y1="247" x2="358" y2="253"/>
    <!-- Ticks vertical -->
    <line x1="244" y1="118" x2="256" y2="118"/>
    <line x1="247" y1="142" x2="253" y2="142"/>
    <line x1="244" y1="382" x2="256" y2="382"/>
    <line x1="247" y1="358" x2="253" y2="358"/>
  </g>

  <!-- ══════════════════════════════════════
       PAYSAGE PLANÉTAIRE
  ══════════════════════════════════════ -->

  <!-- Lueur atmosphérique orange (horizon) -->
  <ellipse cx="250" cy="436" rx="132" ry="28"
    fill="#EA580C" opacity="0.24" filter="url(#atmosphereBlur)"/>
  <ellipse cx="250" cy="428" rx="105" ry="16"
    fill="#F97316" opacity="0.16" filter="url(#atmosphereBlur)"/>

  <!-- Horizon planétaire (légèrement courbé) -->
  <path d="M 133,424 Q 250,415 367,424"
    fill="none" stroke="#D46820" stroke-width="1.3" opacity="0.62"/>

  <!-- Silhouette montagnes alien -->
  <polygon
    points="133,434 148,411 162,422 175,401 189,416 201,394 213,408 225,387 237,401 250,379 263,397 276,384 289,400 301,388 313,402 326,396 339,409 352,397 363,415 367,434"
    fill="#0A1420" opacity="0.90"/>

  <!-- Crêtes teal (lueur bioluminescente alien) -->
  <polygon
    points="133,434 148,411 162,422 175,401 189,416 201,394 213,408 225,387 237,401 250,379 263,397 276,384 289,400 301,388 313,402 326,396 339,409 352,397 363,415 367,434"
    fill="none" stroke="#0D9488" stroke-width="1.3" opacity="0.52"/>

  <!-- Brume atmosphérique basse -->
  <rect x="133" y="421" width="234" height="13"
    fill="url(#atmosGrad)" opacity="0.48" rx="2"/>

  <!-- ══════════════════════════════════════
       CERCLE CENTRAL
  ══════════════════════════════════════ -->
  <circle cx="250" cy="250" r="72"
    fill="#070B14" stroke="url(#goldGrad)" stroke-width="2.5"
    filter="url(#goldGlow)"/>
  <circle cx="250" cy="250" r="67"
    fill="none" stroke="#C8940A" stroke-width="0.8" opacity="0.35"/>

  <!-- Bouton play biseauté (curseur de ciblage Colonial Fleet) -->
  <polygon
    points="218,212 284,234 298,250 284,266 218,288"
    fill="url(#playGrad)" filter="url(#goldGlow)"/>
  <!-- Ligne interne pour relief -->
  <line x1="231" y1="220" x2="231" y2="280"
    stroke="#060A10" stroke-width="2.5" opacity="0.4"/>

  <!-- ══════════════════════════════════════
       TEXTE & IDENTITÉ
  ══════════════════════════════════════ -->

  <!-- Titre "UNISTREAM" -->
  <text x="250" y="362"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="26" font-weight="bold"
    letter-spacing="8"
    fill="url(#goldGrad)"
    filter="url(#textGlow)">UNISTREAM</text>

  <!-- Lignes décoratives flanquant le titre -->
  <line x1="98"  y1="370" x2="162" y2="370" stroke="#C8940A" stroke-width="1" opacity="0.52"/>
  <line x1="338" y1="370" x2="402" y2="370" stroke="#C8940A" stroke-width="1" opacity="0.52"/>

  <!-- Sous-titre -->
  <text x="250" y="383"
    text-anchor="middle"
    font-family="'Courier New',Courier,monospace"
    font-size="9" letter-spacing="3"
    fill="#C8940A" opacity="0.52">// MULTIMEDIA · ARCHIVE //</text>
</svg>
